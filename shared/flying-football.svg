<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="Football flying into frame">
  <defs>
    <radialGradient id="ballSurface" cx="33%" cy="27%" r="76%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.34" stop-color="#eef4f6"/>
      <stop offset="0.68" stop-color="#cbd5dc"/>
      <stop offset="1" stop-color="#7d8994"/>
